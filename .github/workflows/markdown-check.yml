name: Markdown Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Lint Markdown
        run: npm run lint:md
