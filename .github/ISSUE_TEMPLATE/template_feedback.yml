name: Template usage feedback
description: 反馈你如何使用本项目模板、CLI 或案例
title: "[Feedback]: "
labels: ["feedback", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你反馈使用情况。请不要提交密钥、客户信息、内部日志、未公开源码或任何隐私数据。
  - type: dropdown
    id: feature
    attributes:
      label: 使用的模板或功能
      options:
        - PR Review 模板
        - Issue Triage 模板
        - CI 排错模板
        - 测试生成模板
        - 文档更新模板
        - Release note 模板
        - 安全审查模板
        - AI 输出质量评估模板
        - 模板 CLI
        - 真实维护案例
        - 其他
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你把它用在什么工作里？可以抽象描述，不要粘贴敏感内容。
      placeholder: 例如：用 CI 排错模板分析 GitHub Actions markdownlint 失败。
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: 是否解决问题
      options:
        - 解决了
        - 部分解决
        - 没有解决
        - 还没验证
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 它帮你节省了什么工作？
      description: 可以写节省的时间、减少的重复步骤、输出是否能直接用于 issue/PR/release。
  - type: textarea
    id: pain
    attributes:
      label: 哪些地方不好用？
      description: 请说明不清楚、不完整或不适合你场景的地方。
  - type: textarea
    id: request
    attributes:
      label: 你希望补充什么？
      description: 可以是新模板、新案例、CLI 功能或文档改进。
  - type: checkboxes
    id: safety
    attributes:
      label: 提交前确认
      options:
        - label: 我确认没有提交密钥、账号、客户信息、未公开源码或隐私数据
          required: true
        - label: 我的反馈可以被维护者匿名整理成项目使用案例
          required: false
